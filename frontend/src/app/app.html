<div class="shell">
  <header class="shell__bar">
    <a routerLink="/" class="brand" aria-label="archaeo·pro — home">
      <span class="brand__name">archaeo</span>
      <span class="brand__dot" aria-hidden="true">·</span>
      <span class="brand__name brand__name--accent">pro</span>
    </a>

    <button
      type="button"
      class="theme-toggle"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.resolved() === 'dark' ? 'Passa al tema chiaro' : 'Passa al tema scuro'"
      [title]="theme.resolved() === 'dark' ? 'Passa al tema chiaro' : 'Passa al tema scuro'"
    >
      @if (theme.resolved() === 'dark') {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </header>

  <main class="shell__main">
    <router-outlet />
  </main>
</div>
