# Netlify build config.
#
# Routing lives in public/_redirects (Netlify reads it from the publish dir).
# We tried [[redirects]] in this file and they did not fire — keep routing
# in _redirects so it's evaluated by Netlify's standard edge logic.

[build]
  base = "frontend/"
  command = "sh -c 'sed -i \"s|__GITHUB_CLIENT_ID_PROD__|$GITHUB_CLIENT_ID_PROD|g\" src/environments/environment.prod.ts && npm install --no-audit --no-fund && npx ng build --configuration=production'"
  publish = "dist/archaeo-pro/browser"

[build.environment]
  NODE_VERSION = "20"
